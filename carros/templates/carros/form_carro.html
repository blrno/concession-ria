{% extends 'carros/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="card shadow border-0 rounded-4 mx-auto" style="max-width: 500px;">
        <div class="card-body p-4">
            <h3 class="fw-bold mb-4">Novo Veículo</h3>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-success fw-bold">Salvar Veículo</button>
                    <a href="{% url 'lista_carros' %}" class="btn btn-light">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
