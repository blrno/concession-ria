<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Veículos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4 p-2">
    <a class="navbar-brand" href="/">Concessionária</a>
    <div>
        {% if user.is_authenticated %}
            <span class="text-light me-2">Olá, {{ user.username }}</span>
            <form action="{% url 'admin:logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Entrar</a>
        {% endif %}
    </div>
</nav>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %} <script>
    // 1. Limpa a mensagem automaticamente após 2 segundos
    window.onload = function() {
        const alert = document.querySelector('.alert-danger');
        if (alert) {
            setTimeout(() => {
                alert.style.display = 'none';
            }, 2000); 
        }
    };

    const inputs = document.querySelectorAll('.form-control');
    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            const alert = document.querySelector('.alert-danger');
            if (alert) alert.style.display = 'none';
        });
    });
</script> {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    setTimeout(function() {
        let alerts = document.querySelectorAll('.alert');
        alerts.forEach(function(alert) {
            let bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
        });
    }, 3000);
    </script>
</body>
</html>
